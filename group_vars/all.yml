---
# Shared cluster configuration
# Kubernetes minor version — controls the apt repo (pkgs.k8s.io) that kubelet/kubeadm/kubectl are installed from
k8s_version: "1.31"
# Calico CNI release tag
calico_version: "v3.30.2"
pod_network_cidr: "192.168.0.0/16"

# etcd runs as a systemd service on every host in [masters]
# NOTE: recent kubeadm 1.31+ patches require external etcd >= 3.5.24
etcd_version: "v3.5.24"
etcd_data_dir: /var/lib/etcd
etcd_pki_dir: /etc/etcd/pki
etcd_client_port: 2379
etcd_peer_port: 2380

# IP each node advertises to the cluster (etcd peers, apiserver, haproxy backends)
k8s_node_ip: "{{ ansible_facts['default_ipv4']['address'] }}"

# Stable API server endpoint = the haproxy node
apiserver_lb_host: "{{ hostvars[groups['loadbalancer'][0]].ansible_host | default(groups['loadbalancer'][0]) }}"
apiserver_lb_port: 6443
control_plane_endpoint: "{{ apiserver_lb_host }}:{{ apiserver_lb_port }}"
