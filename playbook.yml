---
- name: Prepare all Kubernetes nodes (runtime, kubeadm, kubelet)
  hosts: k8s_nodes
  become: true
  vars:
    node_hostname: "{{ inventory_hostname }}"
  roles:
    - k8s-node-setup

- name: Configure haproxy load balancer for kube-apiserver
  hosts: loadbalancer
  become: true
  pre_tasks:
    - name: Set hostname
      hostname:
        name: "{{ inventory_hostname }}"
  roles:
    - haproxy

- name: Deploy etcd cluster as systemd service on masters
  hosts: masters
  become: true
  roles:
    - etcd

- name: Initialize first control plane
  hosts: masters[0]
  become: true
  vars:
    kube_join_role: master
  roles:
    - kubeadm
    - join
    - cni

- name: Join remaining control planes
  hosts: masters[1:]
  become: true
  serial: 1
  vars:
    kube_join_role: control-plane
  roles:
    - join

- name: Join worker nodes
  hosts: workers
  become: true
  vars:
    kube_join_role: worker
  roles:
    - join

- name: Install kubectl on load balancer and validate cluster end-to-end
  hosts: loadbalancer
  become: true
  roles:
    - kubectl-client

- name: Install cluster tools (helm, k9s) on masters and load balancer
  hosts: masters:loadbalancer
  become: true
  roles:
    - k8s-tools
