---
- name: Install Kubernetes node prerequisites
  become: yes
  ansible.builtin.apt:
    name:
      - conntrack
      - socat
      - ebtables
      - ipset
    state: present


- name: Check if node is already joined
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Resolve master hostname
  set_fact:
    target_master: "{{ (kube_master_host is defined) | ternary(kube_master_host, groups[kube_master_group][0]) }}"

- name: Join worker node to cluster
  become: yes
  ansible.builtin.command: "{{ hostvars[target_master]['kubeadm_join_command'] }}"
  when: not kubelet_conf.stat.exists
  args:
    creates: /etc/kubernetes/kubelet.conf

# ---------- Validation ----------
- name: Validate - kubelet is active on this worker
  command: systemctl is-active kubelet
  changed_when: false

- name: Validate - this worker reports Ready (checked from master)
  become: yes
  command: kubectl --kubeconfig /etc/kubernetes/admin.conf wait node/{{ node_hostname }} --for=condition=Ready --timeout=300s
  delegate_to: "{{ target_master }}"
  changed_when: false
