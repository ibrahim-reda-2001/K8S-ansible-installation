---
- name: Generate kubeadm join command
  command: kubeadm token create --print-join-command
  register: join_command
  changed_when: false

# --config is required: without it upload-certs assumes stacked etcd and the
# kubeadm-certs secret would be missing the external etcd CA/client certs
- name: Upload control-plane certificates and get certificate key
  command: kubeadm init phase upload-certs --upload-certs --config /etc/kubernetes/kubeadm-config.yaml
  register: upload_certs
  changed_when: false

- name: Store join command and certificate key in host facts
  set_fact:
    kubeadm_join_command: "{{ join_command.stdout }}"
    kubeadm_certificate_key: "{{ upload_certs.stdout_lines | last }}"
