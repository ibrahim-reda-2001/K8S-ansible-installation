---
- name: Create etcd system user
  user:
    name: etcd
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Create etcd directories
  file:
    path: "{{ item }}"
    state: directory
    owner: etcd
    group: etcd
    mode: '0700'
  loop:
    - "{{ etcd_data_dir }}"
    - "{{ etcd_pki_dir }}"

- name: Check if etcd binary is already installed
  stat:
    path: "{{ etcd_install_dir }}/etcd"
  register: etcd_binary

- name: Download etcd release tarball
  get_url:
    url: "{{ etcd_download_url }}"
    dest: /tmp/etcd-{{ etcd_version }}.tar.gz
    mode: '0644'
  when: not etcd_binary.stat.exists

- name: Extract etcd tarball
  unarchive:
    src: /tmp/etcd-{{ etcd_version }}.tar.gz
    dest: /tmp
    remote_src: yes
  when: not etcd_binary.stat.exists

- name: Install etcd and etcdctl binaries
  copy:
    src: "/tmp/etcd-{{ etcd_version }}-linux-amd64/{{ item }}"
    dest: "{{ etcd_install_dir }}/{{ item }}"
    mode: '0755'
    remote_src: yes
  loop:
    - etcd
    - etcdctl
  when: not etcd_binary.stat.exists
