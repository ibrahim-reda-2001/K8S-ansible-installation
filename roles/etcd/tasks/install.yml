---
- name: Create etcd system user
  user:
    name: etcd
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Create etcd directories
  file:
    path: "{{ item }}"
    state: directory
    owner: etcd
    group: etcd
    mode: '0700'
  loop:
    - "{{ etcd_data_dir }}"
    - "{{ etcd_pki_dir }}"

- name: Check installed etcd version
  command: "{{ etcd_install_dir }}/etcd --version"
  register: etcd_installed
  failed_when: false
  changed_when: false

- name: Decide whether etcd needs install or upgrade
  set_fact:
    etcd_needs_install: "{{ etcd_installed.rc != 0 or ('etcd Version: ' + (etcd_version | regex_replace('^v', ''))) not in etcd_installed.stdout }}"

- name: Download etcd release tarball
  get_url:
    url: "{{ etcd_download_url }}"
    dest: /tmp/etcd-{{ etcd_version }}.tar.gz
    mode: '0644'
  when: etcd_needs_install

- name: Extract etcd tarball
  unarchive:
    src: /tmp/etcd-{{ etcd_version }}.tar.gz
    dest: /tmp
    remote_src: yes
  when: etcd_needs_install

- name: Install etcd and etcdctl binaries
  copy:
    src: "/tmp/etcd-{{ etcd_version }}-linux-amd64/{{ item }}"
    dest: "{{ etcd_install_dir }}/{{ item }}"
    mode: '0755'
    remote_src: yes
  loop:
    - etcd
    - etcdctl
  when: etcd_needs_install
  notify: Restart etcd
