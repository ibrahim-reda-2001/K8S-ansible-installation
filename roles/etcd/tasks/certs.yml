---
# All certificates are generated once on the first master, then distributed.
- name: Generate etcd PKI on first etcd node
  run_once: true
  delegate_to: "{{ etcd_first_node }}"
  block:
    - name: Install python cryptography library (needed by community.crypto)
      apt:
        name: python3-cryptography
        state: present

    - name: Generate etcd CA private key
      community.crypto.openssl_privatekey:
        path: "{{ etcd_pki_dir }}/ca.key"
        mode: '0600'

    - name: Generate etcd CA CSR
      community.crypto.openssl_csr:
        path: "{{ etcd_pki_dir }}/ca.csr"
        privatekey_path: "{{ etcd_pki_dir }}/ca.key"
        common_name: etcd-ca
        basic_constraints:
          - 'CA:TRUE'
        basic_constraints_critical: yes
        key_usage:
          - keyCertSign
          - cRLSign
        key_usage_critical: yes

    - name: Generate self-signed etcd CA certificate
      community.crypto.x509_certificate:
        path: "{{ etcd_pki_dir }}/ca.crt"
        csr_path: "{{ etcd_pki_dir }}/ca.csr"
        privatekey_path: "{{ etcd_pki_dir }}/ca.key"
        provider: selfsigned
        selfsigned_not_after: "+3650d"

    - name: Generate private key per etcd node
      community.crypto.openssl_privatekey:
        path: "{{ etcd_pki_dir }}/{{ item }}.key"
        mode: '0600'
      loop: "{{ groups['masters'] }}"

    - name: Generate CSR per etcd node (server + peer usage)
      community.crypto.openssl_csr:
        path: "{{ etcd_pki_dir }}/{{ item }}.csr"
        privatekey_path: "{{ etcd_pki_dir }}/{{ item }}.key"
        common_name: "{{ item }}"
        subject_alt_name:
          - "DNS:{{ item }}"
          - "DNS:localhost"
          - "IP:{{ hostvars[item]['k8s_node_ip'] }}"
          - "IP:127.0.0.1"
        extended_key_usage:
          - serverAuth
          - clientAuth
      loop: "{{ groups['masters'] }}"

    - name: Sign certificate per etcd node with etcd CA
      community.crypto.x509_certificate:
        path: "{{ etcd_pki_dir }}/{{ item }}.crt"
        csr_path: "{{ etcd_pki_dir }}/{{ item }}.csr"
        ownca_path: "{{ etcd_pki_dir }}/ca.crt"
        ownca_privatekey_path: "{{ etcd_pki_dir }}/ca.key"
        provider: ownca
        ownca_not_after: "+3650d"
      loop: "{{ groups['masters'] }}"

    - name: Generate apiserver-etcd-client private key
      community.crypto.openssl_privatekey:
        path: "{{ etcd_pki_dir }}/apiserver-etcd-client.key"
        mode: '0600'

    - name: Generate apiserver-etcd-client CSR
      community.crypto.openssl_csr:
        path: "{{ etcd_pki_dir }}/apiserver-etcd-client.csr"
        privatekey_path: "{{ etcd_pki_dir }}/apiserver-etcd-client.key"
        common_name: kube-apiserver-etcd-client
        extended_key_usage:
          - clientAuth

    - name: Sign apiserver-etcd-client certificate with etcd CA
      community.crypto.x509_certificate:
        path: "{{ etcd_pki_dir }}/apiserver-etcd-client.crt"
        csr_path: "{{ etcd_pki_dir }}/apiserver-etcd-client.csr"
        ownca_path: "{{ etcd_pki_dir }}/ca.crt"
        ownca_privatekey_path: "{{ etcd_pki_dir }}/ca.key"
        provider: ownca
        ownca_not_after: "+3650d"

# Distribute certificates to every etcd node (in memory, no files on the control host)
- name: Read certificates from first etcd node
  slurp:
    path: "{{ etcd_pki_dir }}/{{ item }}"
  delegate_to: "{{ etcd_first_node }}"
  register: etcd_cert_files
  loop:
    - ca.crt
    - "{{ inventory_hostname }}.crt"
    - "{{ inventory_hostname }}.key"
    - apiserver-etcd-client.crt
    - apiserver-etcd-client.key

- name: Install etcd node certificates
  copy:
    content: "{{ item.content | b64decode }}"
    dest: "{{ etcd_pki_dir }}/{{ item.dest }}"
    owner: etcd
    group: etcd
    mode: "{{ item.mode }}"
  loop:
    - { content: "{{ etcd_cert_files.results[0].content }}", dest: "ca.crt", mode: '0644' }
    - { content: "{{ etcd_cert_files.results[1].content }}", dest: "server.crt", mode: '0644' }
    - { content: "{{ etcd_cert_files.results[2].content }}", dest: "server.key", mode: '0600' }
  loop_control:
    label: "{{ item.dest }}"
  notify: Restart etcd

- name: Create /etc/kubernetes/pki/etcd directory for kubeadm
  file:
    path: /etc/kubernetes/pki/etcd
    state: directory
    mode: '0755'

- name: Install etcd certificates where kubeadm expects them (external etcd)
  copy:
    content: "{{ item.content | b64decode }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { content: "{{ etcd_cert_files.results[0].content }}", dest: "/etc/kubernetes/pki/etcd/ca.crt", mode: '0644' }
    - { content: "{{ etcd_cert_files.results[3].content }}", dest: "/etc/kubernetes/pki/apiserver-etcd-client.crt", mode: '0644' }
    - { content: "{{ etcd_cert_files.results[4].content }}", dest: "/etc/kubernetes/pki/apiserver-etcd-client.key", mode: '0600' }
  loop_control:
    label: "{{ item.dest }}"
