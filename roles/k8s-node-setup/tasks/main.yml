---
- name: Update apt cache (if older than 1h)
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
      - gnupg
      - python3-urllib3
      - python3-requests
      - bash-completion
    state: present

- name: Create keyrings directory
  become: yes
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key (ASCII, no dearmor)
  become: yes
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Add Docker repository using .sources file
  become: yes
  copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: jammy
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc
  register: docker_repo

- name: Install Docker components
  become: yes
  apt:
    name:
      - containerd.io
      - docker-ce
      - docker-ce-cli
    state: present
    update_cache: "{{ docker_repo.changed }}"

- name: Enable and start Docker services
  service:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - docker
    - containerd

- name: Add user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Create CNI bin directory
  file:
    path: /opt/cni/bin
    state: directory

- name: Check if CNI plugins are already extracted
  stat:
    path: /opt/cni/bin/bridge
  register: cni_bridge

- name: Download CNI plugins
  become: yes
  get_url:
    url: "https://github.com/containernetworking/plugins/releases/download/{{ cni_plugins_version }}/cni-plugins-linux-amd64-{{ cni_plugins_version }}.tgz"
    dest: /tmp/cni-plugins.tgz
    mode: '0644'
  when: not cni_bridge.stat.exists

- name: Extract CNI plugins
  unarchive:
    src: /tmp/cni-plugins.tgz
    dest: /opt/cni/bin
    remote_src: yes
  when: not cni_bridge.stat.exists

- name: Ensure containerd configuration directory exists
  file:
    path: /etc/containerd
    state: directory

- name: Generate containerd default config if not exists
  become: yes
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Set SystemdCgroup = true in containerd config
  become: yes
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd

- name: Ensure containerd is running
  service:
    name: containerd
    state: started
    enabled: yes

- name: Disable swap in fstab
  replace:
    path: /etc/fstab
    regexp: '^(.*swap.*)$'
    replace: '# \1'

- name: Check if swap is active
  command: swapon --show
  register: swap_status
  changed_when: false

- name: Disable active swap
  command: swapoff -a
  when: swap_status.stdout | length > 0

- name: Install SELinux utilities
  apt:
    name: selinux-utils
    state: present

- name: Enable IP forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: yes

- name: Make IP forwarding persistent
  lineinfile:
    path: /etc/sysctl.conf
    line: 'net.ipv4.ip_forward = 1'
    state: present

- name: Set hostname
  hostname:
    name: "{{ node_hostname }}"

- name: Check if Kubernetes repo key exists
  ansible.builtin.stat:
    path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  register: k8s_key

- name: Download Kubernetes GPG key
  become: yes
  shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  when: not k8s_key.stat.exists

- name: Add Kubernetes repository
  become: yes
  copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: |
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /
  register: k8s_repo

- name: Install Kubernetes components
  apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: "{{ k8s_repo.changed }}"

- name: Hold Kubernetes packages
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Enable kubectl bash completion for all users
  shell: kubectl completion bash > /etc/bash_completion.d/kubectl
  args:
    creates: /etc/bash_completion.d/kubectl

- name: Load kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Configure sysctl parameters
  copy:
    dest: /etc/sysctl.d/kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
  notify: Apply sysctl settings

- name: Configure kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Enable kubelet service
  service:
    name: kubelet
    enabled: yes

- name: Flush handlers before validation
  meta: flush_handlers

# ---------- Validation ----------
- name: Validate - containerd is active
  command: systemctl is-active containerd
  changed_when: false

- name: Validate - installed kubeadm version matches k8s_version
  command: kubeadm version -o short
  register: kubeadm_version_check
  changed_when: false
  failed_when: not kubeadm_version_check.stdout.startswith('v' + k8s_version)

- name: Validate - swap is disabled
  command: swapon --show
  register: swap_check
  changed_when: false
  failed_when: swap_check.stdout | length > 0

- name: Validate - required kernel modules are loaded
  stat:
    path: "/sys/module/{{ item }}"
  register: kmod_check
  failed_when: not kmod_check.stat.exists
  loop:
    - overlay
    - br_netfilter
