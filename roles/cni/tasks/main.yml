- name: Download Calico manifest
  become: yes
  become_user: ubuntu  # Or the user that has kubectl access
  shell: |
    curl -sSL https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml -o /home/ubuntu/calico-{{ calico_version }}.yaml
  args:
    creates: /home/ubuntu/calico-{{ calico_version }}.yaml

- name: Apply Calico network plugin
  become: yes
  become_user: ubuntu  # Or the user that has kubectl access
  shell: |
    kubectl apply -f /home/ubuntu/calico-{{ calico_version }}.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
