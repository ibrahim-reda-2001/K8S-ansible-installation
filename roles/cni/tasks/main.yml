- name: Download Calico manifest
  become: yes
  become_user: ubuntu  # Or the user that has kubectl access
  shell: |
    curl -sSL https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml -o /home/ubuntu/calico-{{ calico_version }}.yaml
  args:
    creates: /home/ubuntu/calico-{{ calico_version }}.yaml

- name: Apply Calico network plugin
  become: yes
  become_user: ubuntu  # Or the user that has kubectl access
  shell: |
    kubectl apply -f /home/ubuntu/calico-{{ calico_version }}.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_apply
  changed_when: "'created' in calico_apply.stdout or 'configured' in calico_apply.stdout"

# ---------- Validation ----------
- name: Validate - calico-node daemonset is rolled out
  command: kubectl --kubeconfig /etc/kubernetes/admin.conf -n kube-system rollout status daemonset/calico-node --timeout=300s
  changed_when: false

- name: Validate - CoreDNS is available (proves pod networking works)
  command: kubectl --kubeconfig /etc/kubernetes/admin.conf -n kube-system wait deployment/coredns --for=condition=Available --timeout=300s
  changed_when: false
