---
- name: Install Kubernetes node prerequisites
  become: yes
  apt:
    name:
      - conntrack
      - socat
      - ebtables
      - ipset
    state: present

- name: Check if Kubernetes is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kube_admin_conf

- name: Render kubeadm init configuration
  become: yes
  template:
    src: kubeadm-config.yaml.j2
    dest: /etc/kubernetes/kubeadm-config.yaml
    mode: '0600'

- name: Initialize first control plane with kubeadm (if not initialized)
  become: yes
  command: >
    timeout 1200 kubeadm init
    --config /etc/kubernetes/kubeadm-config.yaml
    --upload-certs
  when: not kube_admin_conf.stat.exists
  register: kubeadm_init_result

- name: Ensure .kube directory exists for {{ kube_config_user }}
  file:
    path: "{{ kube_user_home }}/.kube"
    state: directory
    owner: "{{ kube_config_user }}"
    group: "{{ kube_config_user }}"
    mode: '0750'
  become: yes

- name: Copy admin.conf to user's kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ kube_user_home }}/.kube/config"
    owner: "{{ kube_config_user }}"
    group: "{{ kube_config_user }}"
    mode: '0600'
    remote_src: yes
  become: yes

# ---------- Validation ----------
# admin.conf points at the load balancer endpoint, so this also proves the LB path works
- name: Validate - API server answers /readyz through the load balancer
  command: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw /readyz
  register: api_ready
  retries: 30
  delay: 10
  until: api_ready.rc == 0 and api_ready.stdout == 'ok'
  changed_when: false

- name: Validate - this node is registered as control-plane
  command: kubectl --kubeconfig /etc/kubernetes/admin.conf get node {{ inventory_hostname }} --no-headers
  register: node_check
  changed_when: false
  failed_when: "'control-plane' not in node_check.stdout"

- name: Validate - cluster is using external etcd (no etcd static pod)
  stat:
    path: /etc/kubernetes/manifests/etcd.yaml
  register: etcd_manifest
  failed_when: etcd_manifest.stat.exists
